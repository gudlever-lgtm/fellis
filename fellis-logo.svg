<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#2B5A2E"/>

  <!-- Serif F -->
  <text x="38" y="345"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="318"
        fill="white">F</text>

  <!-- Olive branch stem from middle-bar-right of F toward upper-right -->
  <path d="M 218,215 L 358,72"
        stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none"/>

  <!-- Leaf pairs rotated at -46° along branch direction -->
  <!-- Pair 1 -->
  <ellipse cx="223" cy="196" rx="22" ry="9" fill="white" transform="rotate(-46,223,196)"/>
  <ellipse cx="241" cy="213" rx="22" ry="9" fill="white" transform="rotate(-46,241,213)"/>
  <!-- Pair 2 -->
  <ellipse cx="244" cy="171" rx="22" ry="9" fill="white" transform="rotate(-46,244,171)"/>
  <ellipse cx="262" cy="188" rx="22" ry="9" fill="white" transform="rotate(-46,262,188)"/>
  <!-- Pair 3 -->
  <ellipse cx="266" cy="147" rx="22" ry="9" fill="white" transform="rotate(-46,266,147)"/>
  <ellipse cx="284" cy="164" rx="22" ry="9" fill="white" transform="rotate(-46,284,164)"/>
  <!-- Pair 4 -->
  <ellipse cx="287" cy="122" rx="21" ry="8" fill="white" transform="rotate(-46,287,122)"/>
  <ellipse cx="305" cy="139" rx="21" ry="8" fill="white" transform="rotate(-46,305,139)"/>
  <!-- Pair 5 -->
  <ellipse cx="308" cy="98" rx="19" ry="8" fill="white" transform="rotate(-46,308,98)"/>
  <ellipse cx="326" cy="115" rx="19" ry="8" fill="white" transform="rotate(-46,326,115)"/>
  <!-- Pair 6 -->
  <ellipse cx="328" cy="74" rx="17" ry="7" fill="white" transform="rotate(-46,328,74)"/>
  <ellipse cx="346" cy="91" rx="17" ry="7" fill="white" transform="rotate(-46,346,91)"/>
  <!-- Terminal tip leaf -->
  <ellipse cx="355" cy="75" rx="13" ry="6" fill="white" transform="rotate(-46,355,75)"/>
</svg>
