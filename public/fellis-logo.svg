<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2B5BE0"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1a1a3e" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="400" height="400" rx="76" fill="url(#bg)" filter="url(#shadow)"/>
  <!-- Sheen overlay -->
  <rect width="400" height="200" rx="76" fill="url(#glow)"/>

  <!-- Connection icon: 3 people/nodes as circles with lines -->
  <!-- Connecting lines (drawn first, below dots) -->
  <line x1="200" y1="172" x2="135" y2="218" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.45"/>
  <line x1="200" y1="172" x2="265" y2="218" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.45"/>
  <line x1="149" y1="226" x2="251" y2="226" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.25"/>

  <!-- Top node (largest — the "self") -->
  <circle cx="200" cy="152" r="26" fill="white" opacity="0.97"/>
  <!-- Left node -->
  <circle cx="130" cy="226" r="19" fill="white" opacity="0.80"/>
  <!-- Right node -->
  <circle cx="270" cy="226" r="19" fill="white" opacity="0.80"/>

  <!-- Wordmark: fellis -->
  <text
    x="200" y="308"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="78"
    font-weight="bold"
    fill="white"
    letter-spacing="-3"
  >fellis</text>

  <!-- .eu subtitle -->
  <text
    x="200" y="344"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22"
    fill="white"
    opacity="0.60"
    letter-spacing="5"
  >.eu</text>
</svg>
