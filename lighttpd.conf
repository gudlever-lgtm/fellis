# lighttpd configuration for fellis.eu + test.fellis.eu + chat.fellis.eu
#
# Requirements:
#   - lighttpd 1.4.46+
#   - Node.js backend running on localhost:3001  (cd server && npm start)
#   - Built frontend in /var/www/fellis.eu/      (npm run build → copy index.html + assets/)
#   - Built chat app in /var/www/fellis.eu/chat/dist/  (cd chat && npm run build)
#   - Upload directory at /var/www/fellis.eu/uploads/
#
# Production uses conf-enabled split files under /etc/lighttpd/conf-enabled/.
# This file mirrors that structure and can be used as a reference or standalone config.
#
# Install modules (Debian/Ubuntu):
#   sudo lighttpd-enable-mod proxy rewrite compress setenv accesslog
#
# Test config:
#   lighttpd -t -f /etc/lighttpd/lighttpd.conf
#
# ─────────────────────────────────────────────────────────────────────────────

server.modules = (
  "mod_access",
  "mod_accesslog",
  "mod_setenv",
  "mod_compress",
  "mod_proxy",      # proxy SKAL stå før rewrite
  "mod_rewrite",
)

# ── Stier og grundindstillinger ───────────────────────────────────────────────
server.document-root = "/var/www/fellis.eu"
server.port          = 80
server.username      = "www-data"
server.groupname     = "www-data"
server.pid-file      = "/run/lighttpd/lighttpd.pid"
server.errorlog      = "/var/log/lighttpd/error.log"
accesslog.filename   = "/var/log/lighttpd/access.log"

server.error-handler-404 = "/index.html"

# Stream response body — required for SSE (Server-Sent Events) to work through
# the proxy without lighttpd buffering the entire response before forwarding.
# 2 = always stream, even for responses without Content-Length.
server.stream-response-body = 2

# ── MIME-typer ────────────────────────────────────────────────────────────────
mimetype.assign = (
  ".html"  => "text/html; charset=utf-8",
  ".htm"   => "text/html; charset=utf-8",
  ".js"    => "application/javascript; charset=utf-8",
  ".mjs"   => "application/javascript; charset=utf-8",
  ".css"   => "text/css; charset=utf-8",
  ".json"  => "application/json; charset=utf-8",
  ".svg"   => "image/svg+xml",
  ".ico"   => "image/x-icon",
  ".png"   => "image/png",
  ".jpg"   => "image/jpeg",
  ".jpeg"  => "image/jpeg",
  ".webp"  => "image/webp",
  ".gif"   => "image/gif",
  ".mp4"   => "video/mp4",
  ".webm"  => "video/webm",
  ".woff"  => "font/woff",
  ".woff2" => "font/woff2",
  ".ttf"   => "font/ttf",
  ".txt"   => "text/plain; charset=utf-8",
)

# ── Komprimering (gzip) ───────────────────────────────────────────────────────
compress.cache-dir = "/var/cache/lighttpd/compress"
compress.filetype  = (
  "text/html",
  "text/css",
  "application/javascript",
  "application/json",
  "image/svg+xml",
)

# ── Sikkerhedsheadere ─────────────────────────────────────────────────────────
setenv.add-response-header = (
  "X-Frame-Options"        => "SAMEORIGIN",
  "X-Content-Type-Options" => "nosniff",
  "Referrer-Policy"        => "strict-origin-when-cross-origin",
  "Permissions-Policy"     => "accelerometer=(), autoplay=(self), camera=(), display-capture=(), encrypted-media=(self), fullscreen=(self), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(self), picture-in-picture=(self), usb=(), web-share=(self), xr-spatial-tracking=()",
)

# ── fellis.eu — main app ──────────────────────────────────────────────────────
$HTTP["host"] == "fellis.eu" {
  server.document-root = "/var/www/fellis.eu"

  # Proxy /api/* and /uploads/* → Node.js backend (port 3001)
  $HTTP["url"] =~ "^/api/" {
    proxy.server = ("" => (( "host" => "127.0.0.1", "port" => 3001 )))
  }
  $HTTP["url"] =~ "^/uploads/" {
    proxy.server = ("" => (( "host" => "127.0.0.1", "port" => 3001 )))
  }

  # Forward real client IP — prevents audit log from recording 127.0.0.1
  proxy.forwarded = ( "for" => 1 )

  # SSE: long read-timeout so lighttpd does not kill idle event streams
  $HTTP["url"] =~ "^/api/sse" {
    proxy.read-timeout = 600
  }

  # SPA fallback — all paths without a file on disk → index.html
  url.rewrite-if-not-file = ( "^/.*" => "/index.html" )

  # Cache immutable Vite build assets
  $HTTP["url"] =~ "^/assets/" {
    setenv.add-response-header = (
      "Cache-Control" => "public, max-age=31536000, immutable",
    )
  }
}

# ── test.fellis.eu — staging / test environment ───────────────────────────────
$HTTP["host"] == "test.fellis.eu" {
  server.document-root = "/var/www/fellis.eu"

  $HTTP["url"] =~ "^/api/" {
    proxy.server = ("" => (( "host" => "127.0.0.1", "port" => 3001 )))
  }
  $HTTP["url"] =~ "^/uploads/" {
    proxy.server = ("" => (( "host" => "127.0.0.1", "port" => 3001 )))
  }

  proxy.forwarded = ( "for" => 1 )

  $HTTP["url"] =~ "^/api/sse" {
    proxy.read-timeout = 600
  }

  url.rewrite-if-not-file = ( "^/.*" => "/index.html" )

  $HTTP["url"] =~ "^/assets/" {
    setenv.add-response-header = (
      "Cache-Control" => "public, max-age=31536000, immutable",
    )
  }
}

# ── chat.fellis.eu — standalone chat app vhost ───────────────────────────────
#
# Deploy:
#   cd /var/www/fellis.eu/chat && npm install && npm run build
#   (output goes to /var/www/fellis.eu/chat/dist/)
#
# Certificate (add chat.fellis.eu to existing cert or use separate):
#   sudo certbot certonly --webroot -w /var/www/fellis.eu -d fellis.eu -d www.fellis.eu -d chat.fellis.eu
#
$HTTP["host"] == "chat.fellis.eu" {
  server.document-root = "/var/www/fellis.eu/chat/dist"

  $HTTP["url"] =~ "^/api/" {
    proxy.server = ("" => (( "host" => "127.0.0.1", "port" => 3001 )))
  }
  $HTTP["url"] =~ "^/uploads/" {
    proxy.server = ("" => (( "host" => "127.0.0.1", "port" => 3001 )))
  }

  proxy.forwarded = ( "for" => 1 )

  # SPA fallback — rewrite to index.html, but NOT for /api or /uploads
  url.rewrite-if-not-file = ( "^/(?!(api|uploads)/).*" => "/index.html" )

  $HTTP["url"] =~ "^/assets/" {
    setenv.add-response-header = (
      "Cache-Control" => "public, max-age=31536000, immutable",
    )
  }
}

